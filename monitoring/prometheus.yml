global:
  scrape_interval: 15s      # Як часто збирати дані
  evaluation_interval: 15s  # Як часто перевіряти правила (тривоги)

scrape_configs:
  # Самосприйняття Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Наш головний експортер (пайплайн Kafka)
  - job_name: 'kafka_metrics'
    static_configs:
      - targets: ['metrics_exporter:8000']
        labels:
          service: 'kafka-pipeline'

  # Для майбутнього: моніторинг самого Postgres
  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['postgres:5432']