global:
  scrape_interval: 15s      
  evaluation_interval: 15s  

scrape_configs:
  
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  
  - job_name: 'kafka_metrics'
    static_configs:
      - targets: ['metrics_exporter:8000']
        labels:
          service: 'kafka-pipeline'

  
  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['postgres:5432']