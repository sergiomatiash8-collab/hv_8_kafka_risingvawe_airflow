version: '3.8'

services:
  # ======== ІНФРАСТРУКТУРА (Kafka & Postgres) ========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streaming_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - streaming_net

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: twitter_sentiment
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    ports:
      - "5454:5432"
    volumes:
      - pgdata_final:/var/lib/postgresql/data
    secrets:
      - pg_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d twitter_sentiment"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - streaming_net

  risingwave:
    image: risingwavelabs/risingwave:latest
    command: standalone
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RUST_BACKTRACE=1
    ports:
      - "4566:4566"
    networks:
      - streaming_net
    restart: on-failure

  # ======== ПРИКЛАДНИЙ КОД (Твої Python скрипти) ========
  producer_app:
    build: .
    command: python producer_main.py
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_TOPIC_NAME: "tweets"
      CSV_FILE_PATH: "/app/tweets.csv"
      STREAMING_DELAY: 0.08
    networks:
      - streaming_net
    restart: on-failure

  consumer_app:
    build: .
    command: python consumer_main.py
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      POSTGRES_HOST: "postgres"
      POSTGRES_DB: "twitter_sentiment"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    networks:
      - streaming_net
    restart: on-failure

  metrics_exporter:
    build: .
    command: python src/monitoring/metrics_exporter.py
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      POSTGRES_HOST: "postgres"
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    networks:
      - streaming_net

  # ======== МОНІТОРИНГ (Prometheus & Grafana) ========
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - streaming_net
    depends_on:
      - metrics_exporter

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - streaming_net
    depends_on:
      - prometheus

  # ======== ОРКЕСТРАЦІЯ (Airflow) ========
  airflow_postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - streaming_net

  airflow_webserver:
    image: apache/airflow:2.7.0
    depends_on:
      airflow_postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      # Згенерований Fernet Key для безпеки
      AIRFLOW__CORE__FERNET_KEY: 'b'V0ZfX0tleV9fR2VuZXJhdGVkX19CeV9fR2VtaW5pX18='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - streaming_net

  airflow_scheduler:
    image: apache/airflow:2.7.0
    depends_on:
      airflow_postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'b'V0ZfX0tleV9fR2VuZXJhdGVkX19CeV9fR2VtaW5pX18='
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    networks:
      - streaming_net

secrets:
  pg_password:
    file: ./pg_password.txt

networks:
  streaming_net:
    driver: bridge

volumes:
  pgdata_final:
  airflow_postgres_data: