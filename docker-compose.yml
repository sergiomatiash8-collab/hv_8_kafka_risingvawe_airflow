services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streaming_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streaming_net

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: twitter_sentiment
      POSTGRES_USER: admin
      # Замість прямого пароля використовуємо шлях до секрету
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    ports:
      - "5454:5432"
    volumes:
      - pgdata_final:/var/lib/postgresql/data
    secrets:
      - pg_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d twitter_sentiment"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - streaming_net

  risingwave:
    image: risingwavelabs/risingwave:latest
    command: standalone
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RUST_BACKTRACE=1
    ports:
      - "4566:4566"
      - "5691:5691"
    networks:
      - streaming_net
    restart: on-failure

# Оголошення секретів
secrets:
  pg_password:
    file: ./pg_password.txt # Створи цей файл поруч із docker-compose.yml

networks:
  streaming_net:
    driver: bridge

volumes:
  pgdata_final: